# Global settings
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'agrovision-monitor'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - 'alertmanager:9093'

# Load rules
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Vision Service
  - job_name: 'vision-service'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['vision-service:8003']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # ML Service
  - job_name: 'ml-service'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['ml-service:8004']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # ML Training Service
  - job_name: 'ml-training-service'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['ml-training-service:8106']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Vision YOLO Service
  - job_name: 'vision-yolo-service'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['vision-yolo-service:8005']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Animal Service
  - job_name: 'animal-service'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['animal-service:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # API Gateway
  - job_name: 'api-gateway'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['api-gateway:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # PostgreSQL (via postgres_exporter if available)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis:6379']

  # MongoDB
  # - job_name: 'mongodb'
  #   static_configs:
  #     - targets: ['mongodb-exporter:9216']
