version: '3.9'

services:
  # PostgreSQL - Banco Transacional Principal
  postgres:
    image: postgres:16-alpine
    container_name: boi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boi_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Banco Não-Estruturado (Históricos)
  mongodb:
    image: mongo:7.0
    container_name: boi-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-boi_mongodb}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Redis - Cache e Sessões
  redis:
    image: redis:7-alpine
    container_name: boi-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - Storage S3-Compatible
  minio:
    image: minio/minio:latest
    container_name: boi-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:

networks:
  default:
    name: boi-network
