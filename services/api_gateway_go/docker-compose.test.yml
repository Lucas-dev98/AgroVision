version: '3.8'

# =============================================================================
# Docker Compose para Testes E2E - AgroVision
# =============================================================================
# Inicia todos os serviços necessários para testes integrados
# Uso: docker-compose -f docker-compose.test.yml up
# =============================================================================

services:
  # =========================================================================
  # API Gateway
  # =========================================================================
  api_gateway:
    build: .
    container_name: agrovision_api_gateway_test
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ENVIRONMENT=testing
      - LOG_LEVEL=info
      - ANIMAL_SERVICE_URL=http://animal_service:9000
      - PESAGEM_SERVICE_URL=http://pesagem_service:8001
      - COTACAO_SERVICE_URL=http://cotacao_service:8002
      - VISION_SERVICE_URL=http://vision_service:8003
      - ML_SERVICE_URL=http://ml_service:8004
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=1m
      - JWT_SECRET=test-secret-key
    networks:
      - test_network
    depends_on:
      - animal_service
      - pesagem_service
      - cotacao_service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # =========================================================================
  # Animal Service (Mock/Stub)
  # =========================================================================
  animal_service:
    image: nginx:alpine
    container_name: agrovision_animal_service_test
    ports:
      - "9000:80"
    volumes:
      - ./tests/mock_responses/animal_service.conf:/etc/nginx/conf.d/default.conf
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # =========================================================================
  # Pesagem Service (Mock/Stub)
  # =========================================================================
  pesagem_service:
    image: nginx:alpine
    container_name: agrovision_pesagem_service_test
    ports:
      - "8001:80"
    volumes:
      - ./tests/mock_responses/pesagem_service.conf:/etc/nginx/conf.d/default.conf
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # =========================================================================
  # Cotacao Service (Mock/Stub)
  # =========================================================================
  cotacao_service:
    image: nginx:alpine
    container_name: agrovision_cotacao_service_test
    ports:
      - "8002:80"
    volumes:
      - ./tests/mock_responses/cotacao_service.conf:/etc/nginx/conf.d/default.conf
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # =========================================================================
  # Vision Service (Mock/Stub)
  # =========================================================================
  vision_service:
    image: nginx:alpine
    container_name: agrovision_vision_service_test
    ports:
      - "8003:80"
    volumes:
      - ./tests/mock_responses/vision_service.conf:/etc/nginx/conf.d/default.conf
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # =========================================================================
  # ML Service (Mock/Stub)
  # =========================================================================
  ml_service:
    image: nginx:alpine
    container_name: agrovision_ml_service_test
    ports:
      - "8004:80"
    volumes:
      - ./tests/mock_responses/ml_service.conf:/etc/nginx/conf.d/default.conf
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

networks:
  test_network:
    driver: bridge
