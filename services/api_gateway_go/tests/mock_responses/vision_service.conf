# Mock configuration for Vision Service
server {
    listen 80;
    server_name localhost;

    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"vision-service"}';
    }

    location /api/v1/vision/detect {
        default_type application/json;
        
        if ($request_method = POST) {
            return 202 '{"task_id":"vision_task_001","status":"processing","message":"Detection started"}';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location ~ ^/api/v1/vision/results/(.*)$ {
        default_type application/json;
        return 200 '{"task_id":"vision_task_001","status":"completed","detections":[{"animal_id":1,"confidence":0.95,"coordinates":{"x":100,"y":200,"width":300,"height":250}}]}';
    }

    location / {
        default_type application/json;
        return 404 '{"error":"Not found"}';
    }
}
