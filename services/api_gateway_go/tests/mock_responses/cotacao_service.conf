# Mock configuration for Cotacao Service
server {
    listen 80;
    server_name localhost;

    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"cotacao-service"}';
    }

    location /api/v1/cotacoes {
        default_type application/json;
        
        if ($request_method = GET) {
            return 200 '[{"id":1,"commodity":"beef","price":8500,"currency":"BRL","quote_date":"2024-01-15","source":"market","created_at":"2024-01-01T00:00:00Z"}]';
        }
        
        if ($request_method = POST) {
            return 201 '{"id":1,"commodity":"beef","price":8500,"currency":"BRL","quote_date":"2024-01-15","source":"market","created_at":"2024-01-01T00:00:00Z"}';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location ~ ^/api/v1/cotacoes/(.*)$ {
        default_type application/json;
        
        if ($request_method = GET) {
            return 200 '{"id":1,"commodity":"beef","price":8500,"currency":"BRL","quote_date":"2024-01-15","source":"market","created_at":"2024-01-01T00:00:00Z"}';
        }
        
        if ($request_method = PUT) {
            return 200 '{"id":1,"commodity":"beef","price":8600,"currency":"BRL","quote_date":"2024-01-15","source":"market","updated_at":"2024-01-01T00:00:00Z"}';
        }
        
        if ($request_method = DELETE) {
            return 204 '';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location / {
        default_type application/json;
        return 404 '{"error":"Not found"}';
    }
}
