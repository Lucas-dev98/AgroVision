# Mock configuration for ML Service
server {
    listen 80;
    server_name localhost;

    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"ml-service"}';
    }

    location /api/v1/ml/models {
        default_type application/json;
        
        if ($request_method = GET) {
            return 200 '[{"id":"model_001","name":"Animal Detection v1","version":"1.0","accuracy":0.92,"created_at":"2024-01-01T00:00:00Z"}]';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location /api/v1/ml/predict {
        default_type application/json;
        
        if ($request_method = POST) {
            return 200 '{"prediction_id":"pred_001","model_id":"model_001","result":{"class":"animal","confidence":0.98},"processing_time_ms":145}';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location /api/v1/ml/train {
        default_type application/json;
        
        if ($request_method = POST) {
            return 202 '{"train_id":"train_001","status":"training","message":"Training started","estimated_duration_seconds":3600}';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location ~ ^/api/v1/ml/models/(.*)$ {
        default_type application/json;
        
        if ($request_method = GET) {
            return 200 '{"id":"model_001","name":"Animal Detection v1","version":"1.0","accuracy":0.92,"created_at":"2024-01-01T00:00:00Z"}';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location / {
        default_type application/json;
        return 404 '{"error":"Not found"}';
    }
}
