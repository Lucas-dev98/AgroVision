# Mock configuration for Animal Service
server {
    listen 80;
    server_name localhost;

    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"animal-service"}';
    }

    location /api/v1/animals {
        default_type application/json;
        
        if ($request_method = GET) {
            return 200 '[{"id":1,"ear_tag":"TAG001","name":"Boi 1","breed":"Angus","birth_date":"2020-01-15","gender":"M","status":"active","created_at":"2024-01-01T00:00:00Z"}]';
        }
        
        if ($request_method = POST) {
            return 201 '{"id":1,"ear_tag":"TAG001","name":"Boi 1","breed":"Angus","birth_date":"2020-01-15","gender":"M","status":"active","created_at":"2024-01-01T00:00:00Z"}';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location ~ ^/api/v1/animals/(.*)$ {
        default_type application/json;
        
        if ($request_method = GET) {
            return 200 '{"id":1,"ear_tag":"TAG001","name":"Boi 1","breed":"Angus","birth_date":"2020-01-15","gender":"M","status":"active","created_at":"2024-01-01T00:00:00Z"}';
        }
        
        if ($request_method = PUT) {
            return 200 '{"id":1,"ear_tag":"TAG001","name":"Boi 1","breed":"Angus","birth_date":"2020-01-15","gender":"M","status":"active","updated_at":"2024-01-01T00:00:00Z"}';
        }
        
        if ($request_method = DELETE) {
            return 204 '';
        }
        
        return 400 '{"error":"Invalid request"}';
    }

    location / {
        default_type application/json;
        return 404 '{"error":"Not found"}';
    }
}
