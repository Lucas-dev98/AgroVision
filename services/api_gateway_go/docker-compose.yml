version: '3.8'

services:
  api_gateway:
    build: .
    container_name: agrovision_api_gateway
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - ANIMAL_SERVICE_URL=http://animal_service:9000
      - PESAGEM_SERVICE_URL=http://pesagem_service:8001
      - COTACAO_SERVICE_URL=http://cotacao_service:8002
      - VISION_SERVICE_URL=http://vision_service:8003
      - ML_SERVICE_URL=http://ml_service:8004
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=1m
      - JWT_SECRET=your-secret-key-here
    networks:
      - agrovision_network
    depends_on:
      - animal_service
      - pesagem_service
      - cotacao_service
    restart: unless-stopped

  animal_service:
    image: agrovision/animal-service:latest
    container_name: agrovision_animal_service
    ports:
      - "9000:9000"
    networks:
      - agrovision_network
    restart: unless-stopped

  pesagem_service:
    image: agrovision/pesagem-service:latest
    container_name: agrovision_pesagem_service
    ports:
      - "8001:8001"
    networks:
      - agrovision_network
    restart: unless-stopped

  cotacao_service:
    image: agrovision/cotacao-service:latest
    container_name: agrovision_cotacao_service
    ports:
      - "8002:8002"
    networks:
      - agrovision_network
    restart: unless-stopped

networks:
  agrovision_network:
    driver: bridge
