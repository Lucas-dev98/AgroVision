version: '3.9'\n\nservices:\n  # ==================== DATABASE ====================\n  postgres:\n    image: postgres:15-alpine\n    container_name: agrovision-postgres\n    environment:\n      POSTGRES_USER: ${DB_USER:-postgres}\n      POSTGRES_PASSWORD: ${DB_PASSWORD:-agrovision}\n      POSTGRES_DB: ${DB_NAME:-agrovision_db}\n    ports:\n      - \"${DB_PORT:-5432}:5432\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n      - ./infra/migrations:/docker-entrypoint-initdb.d:ro\n    networks:\n      - agrovision-network\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U ${DB_USER:-postgres}\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n      start_period: 10s\n\n  # ==================== CACHE (REDIS) ====================\n  redis:\n    image: redis:7-alpine\n    container_name: agrovision-redis\n    ports:\n      - \"${REDIS_PORT:-6379}:6379\"\n    volumes:\n      - redis_data:/data\n    networks:\n      - agrovision-network\n    healthcheck:\n      test: [\"CMD\", \"redis-cli\", \"ping\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  # ==================== OBJECT STORAGE (MinIO) ====================\n  minio:\n    image: minio/minio:latest\n    container_name: agrovision-minio\n    environment:\n      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}\n      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}\n    ports:\n      - \"${MINIO_API_PORT:-9000}:9000\"\n      - \"${MINIO_CONSOLE_PORT:-9001}:9001\"\n    volumes:\n      - minio_data:/data\n    command: server /data --console-address \":9001\"\n    networks:\n      - agrovision-network\n\n  # ==================== PROPERTY SERVICE (Go) ====================\n  property-service:\n    build:\n      context: ./services/property-service\n      dockerfile: Dockerfile\n    container_name: agrovision-property-service\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_USER: ${DB_USER:-postgres}\n      DB_PASSWORD: ${DB_PASSWORD:-agrovision}\n      DB_NAME: ${DB_NAME:-agrovision_db}\n      SERVICE_PORT: 8081\n    ports:\n      - \"8081:8081\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n    networks:\n      - agrovision-network\n    restart: unless-stopped\n\n  # ==================== PRODUCTION SERVICE (Go) ====================\n  production-service:\n    build:\n      context: ./services/production-service\n      dockerfile: Dockerfile\n    container_name: agrovision-production-service\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_USER: ${DB_USER:-postgres}\n      DB_PASSWORD: ${DB_PASSWORD:-agrovision}\n      DB_NAME: ${DB_NAME:-agrovision_db}\n      SERVICE_PORT: 8082\n    ports:\n      - \"8082:8082\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n    networks:\n      - agrovision-network\n    restart: unless-stopped\n\n  # ==================== FINANCIAL SERVICE (Go) ====================\n  financial-service:\n    build:\n      context: ./services/financial-service\n      dockerfile: Dockerfile\n    container_name: agrovision-financial-service\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_USER: ${DB_USER:-postgres}\n      DB_PASSWORD: ${DB_PASSWORD:-agrovision}\n      DB_NAME: ${DB_NAME:-agrovision_db}\n      SERVICE_PORT: 8083\n    ports:\n      - \"8083:8083\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n    networks:\n      - agrovision-network\n    restart: unless-stopped\n\n  # ==================== STOCK SERVICE (Go) ====================\n  stock-service:\n    build:\n      context: ./services/stock-service\n      dockerfile: Dockerfile\n    container_name: agrovision-stock-service\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_USER: ${DB_USER:-postgres}\n      DB_PASSWORD: ${DB_PASSWORD:-agrovision}\n      DB_NAME: ${DB_NAME:-agrovision_db}\n      SERVICE_PORT: 8084\n    ports:\n      - \"8084:8084\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n    networks:\n      - agrovision-network\n    restart: unless-stopped\n\n  # ==================== CLIMATE SERVICE (Go) ====================\n  climate-service:\n    build:\n      context: ./services/climate-service\n      dockerfile: Dockerfile\n    container_name: agrovision-climate-service\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_USER: ${DB_USER:-postgres}\n      DB_PASSWORD: ${DB_PASSWORD:-agrovision}\n      DB_NAME: ${DB_NAME:-agrovision_db}\n      SERVICE_PORT: 8085\n    ports:\n      - \"8085:8085\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n    networks:\n      - agrovision-network\n    restart: unless-stopped\n\n  # ==================== REPORTS SERVICE (Go) ====================\n  reports-service:\n    build:\n      context: ./services/reports-service\n      dockerfile: Dockerfile\n    container_name: agrovision-reports-service\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_USER: ${DB_USER:-postgres}\n      DB_PASSWORD: ${DB_PASSWORD:-agrovision}\n      DB_NAME: ${DB_NAME:-agrovision_db}\n      SERVICE_PORT: 8086\n    ports:\n      - \"8086:8086\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n    networks:\n      - agrovision-network\n    restart: unless-stopped\n\n  # ==================== AI SERVICE (Python) ====================\n  ai-service:\n    build:\n      context: ./services/ai-service\n      dockerfile: Dockerfile\n    container_name: agrovision-ai-service\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_USER: ${DB_USER:-postgres}\n      DB_PASSWORD: ${DB_PASSWORD:-agrovision}\n      DB_NAME: ${DB_NAME:-agrovision_db}\n      SERVICE_PORT: 8001\n    ports:\n      - \"8001:8001\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n    networks:\n      - agrovision-network\n    restart: unless-stopped\n\nvolumes:\n  postgres_data:\n  redis_data:\n  minio_data:\n\nnetworks:\n  agrovision-network:\n    driver: bridge\n"
